# ============================================================================
#  checks.yml - per-check configuration
# ----------------------------------------------------------------------------
#  Every check is listed here. Two things you can do per check:
#    enabled: false   -> fully turns the check off (no flag, no alert, no setback,
#                        no packet cancellation). This is a real kill-switch.
#    <tunables>       -> per-check thresholds, where the check exposes any.
#
#  Punishments (what happens when a check flags) still live in punishments.yml.
#  A check left enabled here but absent from punishments.yml will alert but not
#  punish, exactly as before.
#
#  Legacy: a handful of checks still read their tunables from config.yml
#  (noted inline). Their 'enabled' toggle works here regardless. Settings will
#  migrate here fully in a later version; until then config.yml stays authoritative
#  for those values, so existing tuning is never silently overridden.
# ============================================================================

checks:

  # ======== Movement prediction (core) ========
  GroundSpoof:
    enabled: true
  Simulation:
    enabled: true
    # tunables for this check currently live in config.yml (section: Simulation)
  Phase:
    enabled: true
    # tunables for this check currently live in config.yml (section: Phase)

