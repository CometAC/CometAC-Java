    enabled: true
    # tunables for this check currently live in config.yml (section: Behavior)
  EntityPierce:
    enabled: true
    # tunables for this check currently live in config.yml (section: EntityPierce)
  FreezeAttack:
    enabled: true   # experimental
    # Cancel attacks that land during a detected packet freeze.
    cancel-hits: true
    # Setback the player on a confirmed freeze hit.
    setback: true
    # Transaction gap (ms) that counts as a freeze.
    gap-threshold-ms: 1500
    # Stronger gap (ms) weighted more heavily.
    gap-strong-threshold-ms: 2000
    # Freeze score at which hits get cancelled.
    score-cancel: 3
    # Freeze score at which the check flags.
    score-flag: 5
  Hitboxes:
