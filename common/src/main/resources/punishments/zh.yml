# %check_name% - 检查名称
# %description% - 检查的介绍
# %vl% - 违规
# %verbose% - 额外信息
# %player% - 玩家名字
# [alert] - 警告的特殊命令
# [webhook] - 警告discord webhook 的特殊命令
# [proxy] - 用于使用(BungeeCord/Velocity)服务器时的警报
Punishments:
  ProtocolBan:
    remove-violations-after: 300
    checks:
      - "BadPacketsD"
      - "BadPacketsS"
      - "BadPacketsY"
      - "SelfInteract"
    commands:
      - "1:1 [alert]"
      - "1:1 [log]"
      - "1:1 [webhook]"
      - "1:0 [proxy]"
      - "1:0 ban %player% [CometAC] Protocol violation (%check_name%)"
  BehaviorAAlert:
    remove-violations-after: 300
    checks:
      - "BehaviorA"
    commands:
      - "1:1 [alert]"
      - "1:1 [log]"
      - "1:1 [webhook]"
  CrashBan:
    remove-violations-after: 300
    checks:
      - "Crash"
      - "!CrashB"
    commands:
      - "1:1 [alert]"
      - "1:1 [log]"
      - "1:1 [webhook]"
      - "1:0 [proxy]"
      - "5:0 ban %player% [CometAC] Crash exploit (%check_name%)"
  CrashBAlert:
