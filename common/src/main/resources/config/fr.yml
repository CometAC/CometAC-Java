EntityPierce:
    # Enable detection of hitting through other entities
    enabled: true
    # Only check hits against players
    only-players: false
    # Setback VL for hitting through other entities
    setbackvl: 30

Hitboxes:
    extra-expansion: 0.01

Reach:
    # De combien devrions-nous agrandir les hitboxes ? Une augmentation de 0,0005 devrait détecter une portée de 3,0005 ou plus.
    #
    # Il y a un agrandissement forcé de 0,03 avec les versions 1.9 à 1.18.1 (pas 1.18.2) ou certaines combinaisons client/serveur en raison
    # des changements et limitations du protocole. Cette vérification est particulièrement puissante avec les clients 1.7/1.8 sur les serveurs 1.8.
    threshold: 0.0005
    # Distance de portée supplémentaire (blocs) ajoutée au-dessus du seuil.
    # Contrairement au seuil (qui agrandit la hitbox), cela ne prolonge que la distance de portée autorisée,
    # sans affecter la vérification d'intersection de rayons des hitboxes.
    # Augmentez si Reach génère des faux positifs en raison du lag/interpolation. 0.0 = par défaut (strict).
    extra-expansion: 0.01
    # Devons-nous annuler les coups que nous savons impossibles ?
    # Les coups entre 3,00 et 3,03 peuvent passer mais seront quand même signalés en raison des limitations de l'ordre des paquets.
    block-impossible-hits: true
    # Sends an additional packet at the end of every tick to increase the likelihood of catching cheats.
    # Injects into server's connection list to send a final packet just before the server flushes.
    # Increases bandwidth usage for all players but does not decrease overall server performance.
    # Automatically disabled on 1.8 servers unless force-enable-post-packet is true.
    # Default: true (enabled on 1.9+ servers)
    enable-post-packet: true
    # Force enable post-packet even on 1.8 servers where it is auto-disabled.
    force-enable-post-packet: false

exploit:
    allow-sprint-jumping-when-using-elytra: true
    # Cette option atténue le placement du joueur sur les ghostblocks en resynchronisant le joueur lorsque cela se produit.
    allow-building-on-ghostblocks: true
    distance-to-check-if-ghostblocks: 2

# Activer l'enregistrement des plugins ayant injecté dans Netty lors de la connexion pour déboguer les problèmes de compatibilité
debug-pipeline-on-join: false

# Enables all experimental checks
experimental-checks: false

# Enable specific experimental checks individually when experimental-checks is false.
# When experimental-checks is true, all experimental checks are enabled and this list is ignored.
enabled-experimental-checks:
#  - "AirStuck"
#  - "ElytraL"
#  - "ElytraM"
#  - "InventoryF"
#  - "InventoryG"

reset-item-usage-on-item-update: true
reset-item-usage-on-attack: true
reset-item-usage-on-slot-change: true
reset-item-usage-on-item-use: true

# Comet annule parfois des paquets illégaux, comme ceux liés au chronomètre, après avoir annulé X paquets en une seconde,
# à partir de combien de paquets annulés devrions-nous simplement expulser le joueur ?
# Cela est nécessaire car certains limiteurs de paquets ne comptent pas les paquets annulés par Comet.
packet-spam-threshold: 100
# Activez ceci pour afficher une trace de pile lorsqu’un joueur est expulsé à cause du packet-spam-threshold
debug-packet-cancel: false

# Comet peut faire en sorte qu’un joueur sorti de l’état de vol n’ait pas plus de X ms de ping
# Cela est dû au fait que Comet ne vérifie pas encore les joueurs en vol
# Pour désactiver, utilisez -1
max-ping-out-of-flying: 1000

# Ping maximal lorsque la propulsion de feu d’artifice est retirée du joueur.
# Cela empêche les joueurs à forte latence d’utiliser indéfiniment un seul boost de feu d’artifice avec une élytra.
max-ping-firework-boost: 1000

# Marqueurs de schéma — ne modifier qu'en sachant ce que l'on fait.
#   config-flavor:  V2 = build Comet 2.x, V3 = Comet 3.x. Le plugin refuse de
#                   charger une config dont le flavor ne correspond pas à son
#                   propre build : une config V3 ouverte par un jar V2 échoue
#                   immédiatement au lieu de fusionner silencieusement dans
#                   les mauvaises clés.
#   config-version: incrémenté à chaque changement de forme incompatible. Les
#                   anciennes configs sont migrées automatiquement par
#                   l'updater intégré au prochain démarrage.
# Comet actualise toujours les permissions mises en cache quand un joueur rejoint
# le serveur et quand Comet est rechargé, que LuckPerms soit installé ou non.
# Les hooks d'événements LuckPerms actualisent aussi immédiatement les permissions
# Comet mises en cache dans les configurations normales.
# Ce repli périodique n'est nécessaire que pour les changements de permissions en
# ligne non couverts par ces événements, comme un contexte LuckPerms personnalisé
# qui n'appelle pas signalContextUpdate, des lacunes de contexte sur Fabric ou un
# fournisseur de permissions autre que LuckPerms qui change les permissions en direct.
# Mettez -1 pour désactiver le sondage. Mettez une valeur positive pour actualiser tous les X ticks.
update-permission-ticks: -1

config-flavor: V2
config-version: 11
