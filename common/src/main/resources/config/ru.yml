EntityPierce:
    # Enable detection of hitting through other entities
    enabled: true
    # Only check hits against players
    only-players: false
    # Setback VL for hitting through other entities
    setbackvl: 30

Hitboxes:
    extra-expansion: 0.01

Reach:
    # На сколько мы должны расширить хитбоксы? 0.0005 должно определять 3.0005+ дополнительное достижение
    #
    # Существует 0.03 принудительное расширение с 1.9-1.18.1 (не 1.18.2), или некоторыми комбинациями клиент/сервер из-за
    # изменениями и ограничениями протокола. Эта проверка наиболее эффективна с клиентами 1.7/1.8 на серверах 1.8.
    threshold: 0.0005
    # Дополнительное расстояние достижения (блоки) добавляется сверху порога.
    # В отличие от порога (который расширяет хитбокс), это расширяет только допустимое расстояние достижения,
    # не влияя на проверку пересечения лучей хитбоксов.
    # Увеличьте, если Reach генерирует ложные срабатывания из-за лага/интерполяции. 0.0 = по умолчанию (строгое).
    extra-expansion: 0.01
    # Должны ли мы отменять удары, которые, как мы знаем, невозможны?
    # Удары 3.00-3.03 могут пройти, но все равно будут замечены из-за ограничений на порядок пакетов.
    block-impossible-hits: true
    # Sends an additional packet at the end of every tick to increase the likelihood of catching cheats.
    # Injects into server's connection list to send a final packet just before the server flushes.
    # Increases bandwidth usage for all players but does not decrease overall server performance.
    # Automatically disabled on 1.8 servers unless force-enable-post-packet is true.
    # Default: true (enabled on 1.9+ servers)
    enable-post-packet: true
    # Force enable post-packet even on 1.8 servers where it is auto-disabled.
    force-enable-post-packet: false

exploit:
    allow-sprint-jumping-when-using-elytra: true
    # Эта опция смягчает размещение игрока на блоках-призраках, ресинхронизируя его, когда это происходит.
    allow-building-on-ghostblocks: true
    distance-to-check-if-ghostblocks: 2

# Включить запись в журнал плагинов, которые внедрились в netty при присоединении для отладки проблем совместимости
debug-pipeline-on-join: false

# Enables all experimental checks
experimental-checks: false

# Enable specific experimental checks individually when experimental-checks is false.
# When experimental-checks is true, all experimental checks are enabled and this list is ignored.
enabled-experimental-checks:
#  - "AirStuck"
#  - "ElytraL"
#  - "ElytraM"
#  - "InventoryF"
#  - "InventoryG"

reset-item-usage-on-item-update: true
reset-item-usage-on-attack: true
reset-item-usage-on-slot-change: true
reset-item-usage-on-item-use: true

# Грим иногда отменяет незаконные пакеты, например, с таймером, после X пакетов в секунду отмененных, когда следует
# нам просто кикнуть игрока? Это необходимо, так как некоторые ограничители пакетов не учитывают пакеты, отмененные Гримом.
packet-spam-threshold: 100
# Включите, чтобы вывести stacktrace, когда игрок кикается из-за packet-spam-threshold
debug-packet-cancel: false

# Comet может обеспечить, чтобы у игрока, выведенного из состояния полёта, пинг не превышал X мс
# Это связано с тем, что Comet пока не проверяет игроков, находящихся в полёте
# Для отключения используйте -1
max-ping-out-of-flying: 1000

# Максимальный пинг при снятии ускорения фейерверком с игрока.
# Это предотвращает возможность для игроков с большим пингом бесконечно использовать один фейерверк‑буст с элитрой.
max-ping-firework-boost: 1000

# Маркеры схемы — менять только если понимаете, что делаете.
#   config-flavor:  V2 = сборка Comet 2.x, V3 = Comet 3.x. Плагин отказывается
#                   загружать конфиг, чей flavor не совпадает с его собственной
#                   сборкой: V3-конфиг, открытый V2-jar, немедленно падает с
#                   ошибкой вместо того чтобы молча слиться в неверные ключи.
#   config-version: увеличивается при каждом несовместимом изменении формата.
#                   Старые конфиги при следующем запуске автоматически
#                   мигрирует встроенный updater.
# Comet всегда обновляет кэшированные права, когда игрок заходит и когда Comet
# перезагружается, независимо от того, установлен ли LuckPerms.
# Хуки событий LuckPerms в обычных конфигурациях также сразу обновляют
# кэшированные права Comet.
# Этот периодический резервный механизм нужен только для изменений прав онлайн,
# которые не покрываются этими событиями, например для пользовательского контекста
# LuckPerms, который не вызывает signalContextUpdate, пробелов в контекстах Fabric
# или провайдера прав не LuckPerms, который меняет права в реальном времени.
# Установите -1, чтобы отключить опрос. Положительное значение обновляет каждые X тиков.
update-permission-ticks: -1

config-flavor: V2
config-version: 11
