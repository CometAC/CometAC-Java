EntityPierce:
    # Enable detection of hitting through other entities
    enabled: true
    # Only check hits against players
    only-players: false
    # Setback VL for hitting through other entities
    setbackvl: 30

Hitboxes:
    extra-expansion: 0.01

Reach:
    threshold: 0.0005
    # 我们应该将实体碰撞箱扩大多少？ 0.0005 应该检测到 3.0005+ reach
    #
    # 在 1.9-1.18.1（不是 1.18.2）或某些客户端/服务器组合中存在 0.03 距离的增加，因为
    # 协议更改和限制。 对于 1.8 服务器上的 1.7/1.8 客户端，此检查功能最为强大。
    # 在阈值基础上添加的额外伸手距离（块数）。
    # 与阈值（扩大命中框）不同，这只扩大允许的伸手距离，
    # 不影响 Hitboxes 光线交点检查。
    # 如果 Reach 因延迟/插值而产生误报，请增加此值。 0.0 = 默认（严格）。
    extra-expansion: 0.01
    block-impossible-hits: true
    # 我们应该取消不合法的攻击吗？
    # 攻击距离为3.00-3.03可能不会被取消，但仍会被作弊标记，因为有数据包顺序限制
    # Sends an additional packet at the end of every tick to increase the likelihood of catching cheats.
    # Injects into server's connection list to send a final packet just before the server flushes.
    # Increases bandwidth usage for all players but does not decrease overall server performance.
    # Automatically disabled on 1.8 servers unless force-enable-post-packet is true.
    # Default: true (enabled on 1.9+ servers)
    enable-post-packet: true
    # Force enable post-packet even on 1.8 servers where it is auto-disabled.
    force-enable-post-packet: false
    # 这将在每个游戏刻（tick）结束时发送一个额外的数据包，以检查更多的作弊
    # 这会注入服务器的连接列表以在服务器刷新之前发送最终数据
    # 启用这将增加所有玩家的带宽占用
    # 但这不会降低整体服务器性能
    # 启用此功能将检查到更多作弊者。
    # 禁用此功能仍会检查到作弊者，不会导致误报
    # 除非你是专注于1.8版本的PvP服务器，否则不建议使用这个额外的数据包

exploit:
    allow-sprint-jumping-when-using-elytra: true
    # 是否允许玩家在使用鞘翅时候进行的疾跑跳跃
    allow-building-on-ghostblocks: true
    # 该选项可在发生假方块时重新同步玩家方块，并允许玩家在假方块上继续放置方块
    distance-to-check-if-ghostblocks: 2
    # 检查假方块的距离。
    # 范围限制为 2 到 4

# 启用在加入时注入 netty 的日志插件以调试兼容性问题
debug-pipeline-on-join: false

# Enables all experimental checks
experimental-checks: false

# Enable specific experimental checks individually when experimental-checks is false.
# When experimental-checks is true, all experimental checks are enabled and this list is ignored.
enabled-experimental-checks:
#  - "AirStuck"
#  - "ElytraL"
#  - "ElytraM"
#  - "InventoryF"
#  - "InventoryG"

# 取消有问题的格挡
reset-item-usage-on-item-update: true
reset-item-usage-on-attack: true
reset-item-usage-on-slot-change: true
reset-item-usage-on-item-use: true

# Comet有时会取消非法的数据包，比如Timer。
# 在一秒钟内取消了多少个数据包后，我们应该踢掉这个玩家？
# 我们认为你应该启用此项，因为有些数据包限制器并不记录被Comet取消的数据包。
packet-spam-threshold: 100
# 启用此项可在玩家因 packet-spam-threshold 被踢时打印堆栈追踪
debug-packet-cancel: false

# 在玩家处于非飞行状态，且ping（延迟）大于多少毫秒后，Comet会踢出这个玩家？
# 填写-1则关闭
max-ping-out-of-flying: 1000

# 当玩家使用鞘翅飞行，且ping（延迟）大于多少毫秒后，Comet会取消这个玩家正在使用的烟花火箭？
# 可以避免高延迟玩家使用一个烟花火箭就可以一直飞行
# 填写-1则关闭
max-ping-firework-boost: 1000

# 模式标记 — 除非你清楚自己在做什么，否则不要修改。
#   config-flavor:  V2 = Comet 2.x 构建，V3 = Comet 3.x。如果配置的 flavor
#                   与插件构建不一致（例如用 V2 jar 打开 V3 配置），插件会
#                   拒绝加载并立即报错，而不是悄悄合并到错误的键。
#   config-version: 每次发生破坏性结构变更都会递增。下次启动时，旧配置会由
#                   内置 updater 自动迁移。
# 无论是否安装 LuckPerms，玩家加入服务器以及 Comet 重载时，Comet 都会刷新缓存的权限。
# 在常规配置中，LuckPerms 的事件钩子也会立即刷新缓存的 Comet 权限。
# 只有当在线权限变化没有被这些事件覆盖时，才需要这个定期兜底刷新，
# 例如自定义 LuckPerms context 没有调用 signalContextUpdate、Fabric context
# 存在缺口，或非 LuckPerms 权限提供器会在运行中改变权限。
# 设为 -1 可禁用轮询。设为正数则每 X tick 刷新一次。
