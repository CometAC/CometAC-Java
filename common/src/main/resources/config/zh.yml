# config.yml - CometAC 主要配置
# 源代码链接: https://github.com/KaelusMC/CometAC
# 版权所有 © 2025 DefineOutside 及贡献者 / 遵循 GPLv3 开源协议
# 修改过的二进制文件，或带有复制的Comet代码的插件，必须是私有仓库，不得公开售卖此插件。
# 中文翻译提供 Regotly / nuym / Dg32z_ / tjshtqwq , 如有错误请提交 Issues 并@我们

alerts:
    # 除了向有权限的玩家发送作弊vl外，是否还在控制台中打印作弊vl消息？
    print-to-console: true
    # 是否在其他子服中发送控制台的作弊信息
    # 如果正在使用Velocity，你必须在Velocity的配置中启用` bungee-plugin-message-channel `。
    proxy:
        # 作弊消息是否应该发送到连接到代理的子服?
        send: false
        # 此服务器是否接收来自其他子服的作弊消息？
        receive: false

verbose:
    # 是否在控制台中打印verbose信息
    print-to-console: false
# 是否检查更新
check-for-updates: true

client-brand:
    # 这意味着如果客户端型号匹配以下正则表达式，它将不会将其客户端版本显示在聊天栏中
    ignored-clients:
        - "^vanilla$"
        - "^fabric$"
        - "^quilt$"
        - "^lunarclient:v\\d+\\.\\d+\\.\\d+-\\d{4},(?:fabric|forge)$"
        - "^Feather Fabric$"
        - "^labymod$"
    # Comet 将把包含内置攻击距离修改功能的特定 Forge 版本列入黑名单（Forge 1.18.2 至 1.19.3） 可能会导致1.18.2-1.19.3的Forge版本玩家无法进入服务器。
    # 将此选项设置为 false 将允许上述客户端连接服务器。禁用此选项需自行承担风险（建议打开）。
    disconnect-blacklisted-forge-versions: true

spectators:
    # 将拥有 cometac.spectator 权限的人进行隐藏,不管他是否在观察玩家
    hide-regardless: false
    # 观察者在这些世界不会隐藏
    allowed-worlds:
        - ""

# 在玩家无法接收 CometAC 的 transaction 数据包后,多少秒对玩家进行踢出
# 默认踢出原因为: disconnect.timeout
# 玩家超时踢出时间（单位：秒）（默认 = 60）
max-transaction-time: 60

# 启用此选项可禁止Comet取消接收到的Pong包。
# 可能会优化和其他反作弊的兼容性，但可能会与数据包限制器冲突
# 在你不知道你在干什么的情况下，不要启用。
disable-pong-cancelling: false

# 是否应禁用默认的方块重新同步处理程序？
# 默认情况下，Comet 会从服务器世界读取方块并将它们发送给客户端以修复不同步问题。
# 如果您使用通过数据包创建虚假方块（在服务器世界中不存在）的插件，
# 您应将其设置为 true，以防止 Comet用空气/真实方块覆盖它们。
# 除非通过 API 提供了自定义处理程序，否则这将强制使用 "NoOp"（无操作）处理程序。
disable-default-resync-handler: false

# 是否对重复的移动数据包进行撤销?
# 这可以修复 "bucket desync"（桶不同步问题）. https://bugs.mojang.com/browse/MC-12363,不过Mojang已经在1.21修复了这个问题
# 这仅仅适用于1.8服务器中使用1.17-1.20.5版本的玩家
cancel-duplicate-packet: true

# 是否忽视重复的数据包中的玩家转头
ignore-duplicate-packet-rotation: true

Simulation:
    # 这个检查通过仿真玩家的移动，并与玩家的实际移动进行比较
    # 仿真出的位置（玩家理应到达的位置）和玩家实际位置的偏差（距离）即为移动优势。

    # 当玩家合法时，我们应该将总移动优势乘以多少
    # 这是默认配置的样子（x 轴 = seconds ，y 轴 = 1/1000 方块）: https://www.desmos.com/calculator/d4ufgxrxer
    setback-decay-multiplier: 0.999
    # 最大允许玩家移动优势的阈值（单位：方块）
    # 已经内置了Optifine FastMath的三角函数表，设置为0.001可避免FastMath误判
    # 若玩家移动优势大于此阈值，标记玩家作弊
    threshold: 0.001
    # 若玩家的移动优势超过此值，玩家会被强制回弹
    # 假设作弊者的移动优势为0.12，且设置的是0.1，0.12 >= 0.1，玩家会立即被回弹到本应到达的位置
    # -1 关闭此项
    immediate-setback-threshold: 0.1
    # 若玩家的总移动优势超过此值，玩家会被强制回弹
    # 假设作弊者1个游戏刻的移动优势为0.11，并且违规了10次（10个游戏刻），即0.11*10，为1.1
    # 若设置的值为1，1.1 >= 1，那么玩家会立即被回弹到本应到达的位置
    # -1 关闭此项
    max-advantage: 1
    # 在默认配置的50秒后，玩家的总优势将从4个方块变为1个方块
    # 这是默认配置的样子（x 轴 = seconds ，y 轴 = 1/1000 方块）: https://www.desmos.com/calculator/4lovswdarj

    # 若玩家的总移动优势大于此项，则会被重置为此项
    # 例如：总移动优势为4.2，会被强制重置到4
    # 这是为了防止玩家的总移动优势过大，并且永远无法清除总移动优势
    max-ceiling: 4
    # 设置回弹的违规等级阈值
    # 1 为旧行为
    setback-violation-threshold: 1
    # Max residual tolerance for firework look interpolation (blocks/tick)
    # Increase to 0.10 if getting false positives during fast turns with fireworks
    firework-residual-cap: 0.05

# Flying prediction - validates creative/ability flying speed
# This was previously disabled in CometAC, allowing unlimited fly speed
FlyingPrediction:
    # Enable flying movement prediction (validates fly speed)
    enabled: true
    # Extra tolerance for flying speed (blocks/tick)
    # Increase if getting false positives with modified clients (Lunar, etc.)
    # Default 0.05 covers float precision and minor client differences
    tolerance: 0.05

# 检查玩家是否穿墙
Phase:
    setbackvl: 1 # 错误的方块可以允许爬墙，加上这个检查是相对稳定的
    decay: 0.005

AirLiquidPlace:
    cancelvl: 0

FabricatedPlace:
    cancelvl: 5

FarPlace:
    cancelvl: 5

PositionPlace:
    cancelvl: 5

RotationPlace:
    cancelvl: 5

# 使用模拟移动进行的NoSlow(使用物品时不会减速)检查
# 在这里解释错误的服务器代码......即使在发送垃圾数据包时右键单击和副手按钮也很分辨
# 比其他反作弊更稳定，但请报告任何错误......我在这里修复了大量的代码问题。
NoSlow:
    # 最大允许玩家在使用物品时的移动优势（单位：方块）
    # 启用 NoSlow 后，标记量持续为 0.03-0.2
    threshold: 0.001
    # 到达多少VL时回弹
    setbackvl: 5
    # 当玩家使用一个物品并被它减慢时衰减多少VL
    decay: 0.05

Knockback:
    # 当玩家合法时，我们应该将总优势乘以多少
    setback-decay-multiplier: 0.999
    # 最大允许玩家的移动优势（单位：方块）
    threshold: 0.001
    # 若玩家的总移动优势超过此值，玩家会被强制回弹
    # 假设作弊者1个游戏刻的移动优势为0.11，并且违规了10次（10个游戏刻），即0.11*10，为1.1
    # 若设置的值为1，1.1 >= 1，那么玩家会立即被回弹到本应到达的位置
    # -1 关闭此项
    immediate-setback-threshold: 0.1
    # 若玩家的总移动优势超过此值，玩家会被强制回弹
    # 假设作弊者1个游戏刻的移动优势为0.11，并且违规了10次（10个游戏刻），即0.11*10，为1.1
    # 若设置的值为1，1.1 >= 1，那么玩家会立即被回弹到本应到达的位置
    # -1 关闭此项
    max-advantage: 1
    # 若玩家的总移动优势大于此项，则会被重置为此项
    # 例如：总移动优势为4.2，会被强制重置到4
    # 这是为了防止玩家的总移动优势过大，并且永远无法清除总移动优势
    max-ceiling: 4


Explosion:
    threshold: 0.001
    # 若玩家的总移动优势超过此值，玩家会被强制回弹
    # 假设作弊者1个游戏刻的移动优势为0.11，并且违规了10次（10个游戏刻），即0.11*10，为1.1
    # 若设置的值为1，1.1 >= 1，那么玩家会立即被回弹到本应到达的位置
    # -1 关闭此项
    setbackvl: 3
    # 到达多少VL时回弹

TimerA:
    setbackvl: 10
    drift: 120
    # 玩家卡顿时，可以累积以供以后使用的时间（单位：毫秒）
    # 如果设置得太高，可能会允许 1.8版本的快速使用/快速回血/快速射弓绕过，120毫秒似乎是一个很好的平衡

# 此项是config是用来防止玩家移动与实时差距过大，来限制对 TimerA 平衡机制的滥用。
TimerLimit:
    # 在检查玩家的延迟时对timer balance进行限制, 防止滥用
    # 在合法玩家的延迟超过这个延迟阈值时可能会造成误拉回
    # 填写-1则关闭
    ping-abuse-limit-threshold: 1000

NegativeTimer:
    # 玩家的移动丢失了多少毫秒？
    drift: 1200

# 与 TimerA 相同的检查方法，但适用于坐骑
VehicleTimer:
    # 实体的1.0005Timer 检查
    setbackvl: 10
    # VL达到多少时回弹？

PacketOrderI:
    # 如果玩家因使用1.7动画模组而误判，则启用此项
    exempt-placing-while-digging: false

Behavior:
    d:
        angle-threshold: 45.0
        players-only: true
        debug: false
    e:
        players-only: true
        debug: false
        buffer-threshold: 15

Trigger:
    a:
        # Attack interval spread analysis
        players-only: true
        debug: false
        sample-size: 10
        max-spread: 50

WallHit:
    # Enable detection of hitting through blocks (doors, trapdoors, etc.)
    enabled: true
    # Only check hits against players
    only-players: false
