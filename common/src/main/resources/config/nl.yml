EntityPierce:
    # Enable detection of hitting through other entities
    enabled: true
    # Only check hits against players
    only-players: false
    # Setback VL for hitting through other entities
    setbackvl: 30

Hitboxes:
    extra-expansion: 0.01

Reach:
    # Met hoeveel moeten we hitboxes uitbreiden? 0.0005 moet 3.0005+ bereik detecteren
    #
    # Er is 0.03 geforceerde uitbreiding met 1.9-1.18.1 (niet 1.18.2), of sommige client/server combinaties vanwege
    # protocol veranderingen en beperkingen. Deze controle is het krachtigst met 1.7/1.8 clients op 1.8 servers
    threshold: 0.0005
    # Aanvullende bereikafstand (blokken) die boven de drempel wordt toegevoegd.
    # In tegenstelling tot drempel (die de hitbox uitbreidt), breidt dit alleen de toegestane bereikafstand uit,
    # zonder de rayintersectiecontrole van Hitboxes te beïnvloeden.
    # Verhoog als Reach valse positieven geeft vanwege lag/interpolatie. 0.0 = standaard (strikt).
    extra-expansion: 0.01
    # Moeten we hits annuleren waarvan we weten dat ze onmogelijk zijn?
    # 3.00-3.03 hits kunnen doorkomen, maar toch gemarkeerd worden, vanwege pakketvolgorderbeperkingen
    block-impossible-hits: true
    # Sends an additional packet at the end of every tick to increase the likelihood of catching cheats.
    # Injects into server's connection list to send a final packet just before the server flushes.
    # Increases bandwidth usage for all players but does not decrease overall server performance.
    # Automatically disabled on 1.8 servers unless force-enable-post-packet is true.
    # Default: true (enabled on 1.9+ servers)
    enable-post-packet: true
    # Force enable post-packet even on 1.8 servers where it is auto-disabled.
    force-enable-post-packet: false

exploit:
    # Je kunt hoge snelheden krijgen als je sprint met een elytra, dit voorkomt de exploit als het op false staat
    # Mojang heeft de netcode verpest door elytra's client-sided te laten starten en elytra's server-sided te laten eindigen
    # Elytra's hebben 0.99 horizontale wrijving, dus het constant toevoegen van 0.2 horizontale snelheden resulteert in zeer hoge snelheden.
    allow-sprint-jumping-when-using-elytra: true
    # Deze optie verzacht de plaatsing van de speler op ghostblocks door de speler opnieuw te synchroniseren wanneer dit gebeurt
    allow-building-on-ghostblocks: true
    # Deze instelling, beïnvloed door de boolean hierboven, bepaalt de afstand om te controleren op ghostblocks
    # Het geldige bereik is beperkt van 2 tot 4
    distance-to-check-if-ghostblocks: 2

# Logging plugins inschakelen die geïnjecteerd zijn in netty on join om compatibiliteitsproblemen te debuggen
debug-pipeline-on-join: false

# Enables all experimental checks
experimental-checks: false

# Enable specific experimental checks individually when experimental-checks is false.
# When experimental-checks is true, all experimental checks are enabled and this list is ignored.
enabled-experimental-checks:
#  - "AirStuck"
#  - "ElytraL"
#  - "ElytraM"
#  - "InventoryF"
#  - "InventoryG"

reset-item-usage-on-item-update: true
reset-item-usage-on-attack: true
reset-item-usage-on-slot-change: true
reset-item-usage-on-item-use: true

# Comet annuleert soms illegale pakketten zoals met timer, na X pakketten in een seconde geannuleerd, wanneer moeten
# we de speler gewoon schoppen? Dit is nodig omdat sommige pakket-begrenzers pakketten die door comet worden geannuleerd niet tellen
packet-spam-threshold: 100
# Schakel dit in om een stacktrace af te drukken wanneer een speler wordt gekickt wegens packet-spam-threshold
debug-packet-cancel: false

# Comet kan afdwingen dat een speler die uit de vliegmodus is gezet niet meer dan X ms ping heeft
# Dit komt doordat Comet momenteel vliegende spelers niet controleert
# Om uit te schakelen, gebruik -1
max-ping-out-of-flying: 1000

# Maximale ping wanneer een vuurwerkboost van de speler wordt verwijderd.
# Dit voorkomt dat spelers met hoge latency oneindig één vuurwerkboost met een elytra kunnen gebruiken.
max-ping-firework-boost: 1000

# Schemamarkers — alleen aanpassen als je weet wat je doet.
#   config-flavor:  V2 = Comet 2.x-build, V3 = Comet 3.x. De plugin weigert een
#                   config te laden waarvan de flavor niet overeenkomt met de
#                   eigen build: een V3-config die door een V2-jar wordt
#                   geopend, faalt direct in plaats van stilletjes te mergen
#                   met de verkeerde sleutels.
#   config-version: wordt verhoogd bij elke incompatibele vormwijziging. Oude
#                   configs worden bij de volgende start automatisch
#                   gemigreerd door de meegeleverde updater.
# Comet vernieuwt gecachete permissies altijd wanneer een speler joint en wanneer
# Comet wordt herladen, ongeacht of LuckPerms is geïnstalleerd.
# LuckPerms-eventhooks vernieuwen gecachete Comet-permissies in normale setups ook meteen.
# Deze periodieke fallback is alleen nodig voor online permissiewijzigingen die niet
# door die events worden gedekt, zoals een aangepaste LuckPerms-context die
# signalContextUpdate niet aanroept, ontbrekende Fabric-contextupdates of een
# permissieprovider anders dan LuckPerms die live permissies wijzigt.
# Zet op -1 om polling uit te schakelen. Zet op een positieve waarde om elke X ticks te vernieuwen.
update-permission-ticks: -1

config-flavor: V2
config-version: 11
