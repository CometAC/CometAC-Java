EntityPierce:
    # Enable detection of hitting through other entities
    enabled: true
    # Only check hits against players
    only-players: false
    # Setback VL for hitting through other entities
    setbackvl: 30

Hitboxes:
    extra-expansion: 0.01

Reach:
    # Por quanto deve-se expandir as caixas de colisão? 0.0005 deve detectar 3.0005+ de alcance.
    #
    # Há 0.03 de expansão forçada nas versões 1.9-1.18.1 (não a 1.18.2), ou algumas combinações de cliente/servidor por
    # conta de mudanças no protocolo e limitações. Essa verificação é mais poderosa com clientes da 1.7/1.8 em servidores
    # da 1.8.
    threshold: 0.0005
    # Distância de alcance extra (blocos) adicionada no topo do limite.
    # Ao contrário do limite (que expande a caixa de colisão), isso estende apenas a distância de alcance permitida,
    # sem afetar a verificação de interseção de raios das caixas de colisão.
    # Aumente se Reach gerar falsos positivos devido a lag/interpolação. 0.0 = padrão (rigoroso).
    extra-expansion: 0.01
    # Deve-se cancelar hits que sabemos que são impossíveis?
    # O alcance de 3.00-3.03 pode acabar passando, por conta da ordem de pacotes, mas continuará registrando violações.
    block-impossible-hits: true
    # Sends an additional packet at the end of every tick to increase the likelihood of catching cheats.
    # Injects into server's connection list to send a final packet just before the server flushes.
    # Increases bandwidth usage for all players but does not decrease overall server performance.
    # Automatically disabled on 1.8 servers unless force-enable-post-packet is true.
    # Default: true (enabled on 1.9+ servers)
    enable-post-packet: true
    # Force enable post-packet even on 1.8 servers where it is auto-disabled.
    force-enable-post-packet: false

exploit:
    # Você pode ganhar altas velocidades se pular correndo com uma elytra, previne isso de ocorrer quando definido falso.
    # A Mojang vacilou com o netcode por fazer a Elytra iniciar pelo lado do cliente.
    # As Elytras levam 0.99 de fricção horizontal, então constantemente adicionando 0.2 de velocidade horizontal resulta
    # em velocidades altíssimas.
    allow-sprint-jumping-when-using-elytra: true
    # Essa opção mitiga posicionar blocos em blocos fantasma, ressincronizando o jogador quando isso ocorrer.
    allow-building-on-ghostblocks: true
    # Esse ajuste, influído pela opção acima, define a distância para verificar blocos fantasmas.
    # O valor válido é limitado de 2 a 4.
    distance-to-check-if-ghostblocks: 2

# Registra plugins que são injetados na netty ao entrar para depurar erros de compatibilidade.
debug-pipeline-on-join: false

# Enables all experimental checks
experimental-checks: false

# Enable specific experimental checks individually when experimental-checks is false.
# When experimental-checks is true, all experimental checks are enabled and this list is ignored.
enabled-experimental-checks:
#  - "AirStuck"
#  - "ElytraL"
#  - "ElytraM"
#  - "InventoryF"
#  - "InventoryG"

reset-item-usage-on-item-update: true
reset-item-usage-on-attack: true
reset-item-usage-on-slot-change: true
reset-item-usage-on-item-use: true

# Comet às vezes cancela pacotes ilegais como com o timer, depois de X pacotes em um segundo que foram cancelados, quando
# deve-se simplesmente expulsar o jogador? Isso é requirido já que alguns limitadores de pacotes não contam pacotes
# cancelados pelo Comet.
packet-spam-threshold: 100
# Habilite isto para imprimir um stacktrace quando um jogador for expulso devido ao packet-spam-threshold
debug-packet-cancel: false
# Comet pode impor que o jogador fora do estado de voo não possa ter mais de X milissegundos de ping.
# Isso ocorre porque o Comet atualmente não verifica os jogadores que estão voando.
# -1 desabilitará.
max-ping-out-of-flying: 1000

# Ping máximo quando o impulso do foguete acaba.
# Previne jogadores com ping alto de usarem um foguete ara voar indefinidamente.
max-ping-firework-boost: 1000

# Marcadores de esquema — toque apenas se souber o que está fazendo.
#   config-flavor:  V2 = build do Comet 2.x, V3 = Comet 3.x. O plugin se recusa
#                   a carregar uma config cujo flavor não bate com seu próprio
#                   build; uma config V3 aberta por um jar V2 falha
#                   imediatamente em vez de mesclar silenciosamente em chaves
#                   erradas.
#   config-version: incrementado a cada mudança de forma incompatível. Configs
#                   antigas são migradas automaticamente pelo updater embutido
#                   na próxima inicialização.
# O Comet sempre atualiza as permissões em cache quando um jogador entra e quando
# o Comet é recarregado, esteja o LuckPerms instalado ou não.
# Os hooks de eventos do LuckPerms também atualizam imediatamente as permissões
# do Comet em cache em configurações normais.
# Este fallback periódico só é necessário para mudanças de permissões online não
# cobertas por esses eventos, como um contexto personalizado do LuckPerms que não
# chama signalContextUpdate, lacunas de contexto no Fabric ou um provedor de
# permissões diferente do LuckPerms que altera permissões ao vivo.
# Defina -1 para desativar a verificação periódica. Use um valor positivo para atualizar a cada X ticks.
update-permission-ticks: -1

config-flavor: V2
config-version: 11
