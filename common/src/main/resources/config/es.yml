EntityPierce:
    # Enable detection of hitting through other entities
    enabled: true
    # Only check hits against players
    only-players: false
    # Setback VL for hitting through other entities
    setbackvl: 30

Hitboxes:
    extra-expansion: 0.01

Reach:
    # Cuanto deberíamos expandir las hit-boxes? 0.0005 debería detectar un reach de 3.0005+
    #
    # Hay una expansion forzada de 0.03 con 1.9-1.18.1 (1.18.2 no) y algunas combinaciones de clientes/servidores
    # debido a cambios en el protocolo y limitaciones. Esta comprobación es más poderosa en clientes 1.7 y 1.8
    # conectados a un servidor 1.8
    threshold: 0.0005
    # Distancia de alcance adicional (bloques) agregada en la parte superior del umbral.
    # A diferencia del umbral (que expande la hitbox), esto extiende solo la distancia de alcance permitida,
    # sin afectar la comprobación de intersección de rayos de Hitboxes.
    # Aumenta si Reach genera falsos positivos debido a lag/interpolación. 0.0 = predeterminado (estricto).
    extra-expansion: 0.01
    # ¿Deberíamos cancelar golpes que sabemos que son imposibles?
    # Golpes de 3.00-3.03 puede que aun asi pasen, pero se marcaran debido a limitaciones del orden de paquetes.
    block-impossible-hits: true
    # Sends an additional packet at the end of every tick to increase the likelihood of catching cheats.
    # Injects into server's connection list to send a final packet just before the server flushes.
    # Increases bandwidth usage for all players but does not decrease overall server performance.
    # Automatically disabled on 1.8 servers unless force-enable-post-packet is true.
    # Default: true (enabled on 1.9+ servers)
    enable-post-packet: true
    # Force enable post-packet even on 1.8 servers where it is auto-disabled.
    force-enable-post-packet: false

exploit:
    allow-sprint-jumping-when-using-elytra: true
    # Esta opción mitiga la colocación del jugador en bloques fantasma resincronizando al jugador cuando ocurre.
    allow-building-on-ghostblocks: true
    distance-to-check-if-ghostblocks: 2

# Habilitar el registro de plugins que se han inyectado a netty para intentar resolver problemas de compatibilidad.
debug-pipeline-on-join: false

# Enables all experimental checks
experimental-checks: false

# Enable specific experimental checks individually when experimental-checks is false.
# When experimental-checks is true, all experimental checks are enabled and this list is ignored.
enabled-experimental-checks:
#  - "AirStuck"
#  - "ElytraL"
#  - "ElytraM"
#  - "InventoryF"
#  - "InventoryG"

reset-item-usage-on-item-update: true
reset-item-usage-on-attack: true
reset-item-usage-on-slot-change: true
reset-item-usage-on-item-use: true

# Comet a veces cancela paquetes ilegal como los de Timer. Después de X paquetes en un solo segundo cancelados,
# cuando deberíamos simplemente expulsar al jugador? Esto es obligatorio ya que algunos limitadores de paquetes
# no cuentan los paquetes cancelados por Comet.
packet-spam-threshold: 100
# Activa esto para imprimir un stacktrace cuando un jugador sea expulsado por packet-spam-threshold
debug-packet-cancel: false

# Comet puede hacer cumplir que un jugador que ha salido del estado de vuelo no tenga más de X ms de ping
# Esto se debe a que Comet actualmente no comprueba a los jugadores que están volando
# Para desactivar, usa -1
max-ping-out-of-flying: 1000

# Ping máximo cuando se elimina el impulso de fuegos artificiales del jugador.
# Esto evita que los jugadores con alta latencia puedan usar un solo impulso con fuegos artificiales y una elytra para siempre.
max-ping-firework-boost: 1000

# Marcadores de esquema — toca solo si sabes lo que haces.
#   config-flavor:  V2 = build de Comet 2.x, V3 = Comet 3.x. El plugin se niega
#                   a cargar una config cuyo flavor no coincida con su propio
#                   build; una config V3 abierta por un jar V2 falla rápido en
#                   vez de fusionarse silenciosamente en claves equivocadas.
#   config-version: se incrementa con cada cambio de forma incompatible. Las
#                   configs antiguas se migran automáticamente con el updater
#                   incluido al siguiente arranque.
# Comet siempre actualiza los permisos en caché cuando un jugador entra y cuando
# Comet se recarga, tenga o no LuckPerms instalado.
# Los hooks de eventos de LuckPerms también actualizan inmediatamente los permisos
# de Comet en caché en configuraciones normales.
# Este respaldo periódico solo es necesario para cambios de permisos en línea no
# cubiertos por esos eventos, como un contexto personalizado de LuckPerms que no
# llame a signalContextUpdate, huecos de contexto en Fabric o un proveedor de
# permisos que no sea LuckPerms y cambie permisos en vivo.
# Usa -1 para desactivar el sondeo. Usa un valor positivo para actualizar cada X ticks.
update-permission-ticks: -1

config-flavor: V2
config-version: 11
