EntityPierce:
    # Enable detection of hitting through other entities
    enabled: true
    # Only check hits against players
    only-players: false
    # Setback VL for hitting through other entities
    setbackvl: 30

Hitboxes:
    extra-expansion: 0.01

Reach:
    # O ile powinniśmy zwiększyć hitboxy? 0.0005 powinno wykrywać zasięg 3.0005+.
    #
    # Wymuszone zwiększenie o 0.03 występuje w wersjach 1.9-1.18.1 (z wyjątkiem 1.18.2) lub w niektórych kombinacjach klient/serwer
    # ze względu na zmiany i ograniczenia protokołu. Ta kontrola jest najskuteczniejsza dla klientów 1.7/1.8 na serwerach 1.8.
    threshold: 0.0005
    # Dodatkowa odległość zasięgu (bloki) dodawana na górze progu.
    # W przeciwieństwie do progu (który rozszerza hitbox), to rozszerza tylko dozwoloną odległość zasięgu,
    # bez wpływu na kontrolę przecięcia promieni hitboxów.
    # Zwiększ, jeśli Reach powoduje fałszywe alarmy z powodu lag/interpolacji. 0.0 = domyślne (rygorystyczne).
    extra-expansion: 0.01
    # Czy powinniśmy anulować trafienia, które wiemy, że są niemożliwe?
    # Trafienia w przedziale 3.00-3.03 mogą przejść, ale nadal będą wykrywane z powodu ograniczeń kolejności pakietów.
    block-impossible-hits: true
    # Sends an additional packet at the end of every tick to increase the likelihood of catching cheats.
    # Injects into server's connection list to send a final packet just before the server flushes.
    # Increases bandwidth usage for all players but does not decrease overall server performance.
    # Automatically disabled on 1.8 servers unless force-enable-post-packet is true.
    # Default: true (enabled on 1.9+ servers)
    enable-post-packet: true
    # Force enable post-packet even on 1.8 servers where it is auto-disabled.
    force-enable-post-packet: false

exploit:
    # Można uzyskać duże prędkości podczas sprintu i skoku z elytrą. To ustawienie zapobiega temu exploitowi, gdy jest ustawione na false.
    # Mojang zepsuł kod sieciowy, powodując, że start lotu elytrą jest obsługiwany przez klienta, a koniec przez serwer.
    # Elytry mają poziome tarcie 0.99, więc ciągłe dodawanie poziomej prędkości 0.2 skutkuje bardzo dużymi prędkościami.
    allow-sprint-jumping-when-using-elytra: true
    # Ta opcja łagodzi efekt stawiania bloków na tzw. ghostblockach poprzez resynchronizację gracza, gdy to nastąpi.
    allow-building-on-ghostblocks: true
    # To ustawienie, zależne od powyższej wartości logicznej, określa dystans do sprawdzania ghostblocków.
    # Jego prawidłowy zakres jest ograniczony od 2 do 4.
    distance-to-check-if-ghostblocks: 2

# Włącz logowanie pluginów, które wstrzyknęły się do netty podczas dołączania gracza, w celu debugowania problemów z kompatybilnością.
debug-pipeline-on-join: false

# Enables all experimental checks
experimental-checks: false

# Enable specific experimental checks individually when experimental-checks is false.
# When experimental-checks is true, all experimental checks are enabled and this list is ignored.
enabled-experimental-checks:
#  - "AirStuck"
#  - "ElytraL"
#  - "ElytraM"
#  - "InventoryF"
#  - "InventoryG"

reset-item-usage-on-item-update: true
reset-item-usage-on-attack: true
reset-item-usage-on-slot-change: true
reset-item-usage-on-item-use: true

# Comet czasami anuluje nielegalne pakiety, np. przy użyciu timera. Po anulowaniu X pakietów na sekundę, kiedy powinniśmy
# po prostu wyrzucić gracza? Jest to wymagane, ponieważ niektóre limitery pakietów nie liczą pakietów anulowanych przez Cometa.
packet-spam-threshold: 100
# Włącz to, aby wydrukować stack trace, gdy gracz zostanie wyrzucony z powodu przekroczenia packet-spam-threshold.
debug-packet-cancel: false

# Comet jest w stanie egzekwować, że gracz, który nie jest w stanie lotu, nie może mieć więcej niż X milisekund pingu.
# Wynika to z faktu, że Comet obecnie nie sprawdza latających graczy.
# Aby wyłączyć, użyj -1.
max-ping-out-of-flying: 1000

# Maksymalny ping, przy którym boost z fajerwerka jest usuwany graczowi.
# Zapobiega to sytuacji, w której gracze z wysokim opóźnieniem mogą używać jednego boostu z fajerwerka z elytrą w nieskończoność.
max-ping-firework-boost: 1000

# Znaczniki schematu — zmieniaj tylko jeśli wiesz, co robisz.
#   config-flavor:  V2 = build Comet 2.x, V3 = Comet 3.x. Wtyczka odmawia
#                   wczytania konfiguracji, której flavor nie zgadza się z jej
#                   buildem; config V3 otwarty przez jar V2 natychmiast się
#                   nie powiedzie, zamiast po cichu scalać się w niewłaściwe
#                   klucze.
#   config-version: zwiększany przy każdej niekompatybilnej zmianie formatu.
#                   Stare configi są automatycznie migrowane przez wbudowany
#                   updater przy następnym starcie.
# Comet zawsze odświeża uprawnienia w pamięci podręcznej, gdy gracz dołącza i gdy
# Comet jest przeładowywany, niezależnie od tego, czy LuckPerms jest zainstalowany.
# Hooki zdarzeń LuckPerms w typowych konfiguracjach również natychmiast odświeżają
# uprawnienia Comet w pamięci podręcznej.
# Ten okresowy fallback jest potrzebny tylko dla zmian uprawnień online, których
# nie obejmują te zdarzenia, np. niestandardowego kontekstu LuckPerms, który nie
# wywołuje signalContextUpdate, luk w kontekstach Fabric albo dostawcy uprawnień
# innego niż LuckPerms, który zmienia uprawnienia na żywo.
# Ustaw -1, aby wyłączyć odpytywanie. Ustaw wartość dodatnią, aby odświeżać co X ticków.
update-permission-ticks: -1

config-flavor: V2
config-version: 11
