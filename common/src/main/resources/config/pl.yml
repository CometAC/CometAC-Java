# CometAC główna konfiguracja
# Kod źródłowy: https://github.com/KaelusMC/CometAC
# Prawa autorskie 2025 DefineOutside i współautorzy, licencjonowane na podstawie GPLv3.
# Zmodyfikowane pliki binarne, albo pluginy z skopiowanym kodem comet, muszą być prywatne,
# lub z pełnym kodem źródłowym dostępnym dla kupujących bez dodatkowych kosztów.

alerts:
    # Czy oprócz wysyłania alertów do graczy, powinny być one również wysyłane na konsolę?
    print-to-console: true
    # Określa, czy i w jaki sposób alerty są udostępniane pomiędzy serwerami połączonymi z Twoim serwerem proxy.
    # Jeśli korzystasz z Velocity, musisz włączyć opcję „bungee-plugin-message-channel” w konfiguracji Velocity.
    proxy:
        # Czy alerty powinny być wysyłane do innych serwerów podłączonych do Twojego serwera proxy?
        send: false
        # Czy alerty otrzymywane z innych serwerów powinny być przekazywane temu serwerowi?
        receive: false

verbose:
    print-to-console: false

check-for-updates: true

client-brand:
    # Oznacza to, że nie będzie transmitować swojej marki operatorom, jeśli marka będzie pasować do następujących wyrażeń regularnych.
    ignored-clients:
        - "^vanilla$"
        - "^fabric$"
        - "^quilt$"
        - "^lunarclient:v\\d+\\.\\d+\\.\\d+-\\d{4},(?:fabric|forge)$"
        - "^Feather Fabric$"
        - "^labymod$"
    # Comet umieści na czarnej liście konkretne wersje Forge, które zawierają wbudowane modyfikacje Reach (Forge 1.18.2 do 1.19.3).
    # Ustawienie tej opcji na fałsz umożliwi tym klientom połączenie się z serwerem. Wyłączasz tę opcję na własne ryzyko.
    disconnect-blacklisted-forge-versions: true

spectators:
    # Ukryj wszystkich widzów z uprawnieniem cometac.spectator, niezależnie od tego, czy są oni faktycznie aktywnymi widzami
    hide-regardless: false
    # Spowoduje, że widzowie będą ukryci tylko w tych światach, a pozostawienie pustego pola umożliwi dostęp do wszystkich światów
    allowed-worlds:
        - ""

# Ile czasu powinni mieć gracze, zanim ich wyrzucimy za przekroczenie limitu czasu? Domyślnie = 60 sekund
max-transaction-time: 60

# Włącz tę opcję, aby uniemożliwić Cometowi anulowanie komunikatów Pong otrzymanych od graczy.
# Może to poprawić kompatybilność z innymi programami antycheatowymi. Może to powodować problemy z limiterami pakietów.
# Nie włączaj tej opcji, jeśli nie masz pewności, co robisz.
disable-pong-cancelling: false

# Czy domyślna procedura obsługi resynchronizacji bloków powinna zostać wyłączona?
# Domyślnie Comet odczytuje bloki ze świata serwera i wysyła je do klienta w celu naprawy desynchronizacji.
# Jeśli używasz wtyczek, które tworzą fałszywe bloki oparte na pakietach (które nie istnieją w świecie serwera),
# powinieneś ustawić tę opcję na true, aby uniemożliwić Cometowi nadpisywanie ich blokami air/real.
# Wymusza to użycie procedury obsługi „NoOp” (No Operation), chyba że zostanie ona udostępniona za pośrednictwem API.
disable-default-resync-handler: false

# Czy zduplikowany pakiet ruchu powinien zostać anulowany?
# Mojang naprawił ten problem w wersji 1.21. To była ich próba naprawienia „desynchronizacji kontenera”. https://bugs.mojang.com/browse/MC-12363
# To ustawienie dotyczy tylko klientów 1.17-1.20.5 na serwerach 1.8.
cancel-duplicate-packet: true

# Czy ignorować rotację w zduplikowanych pakietach
ignore-duplicate-packet-rotation: true

Simulation:
    # O ile powinniśmy pomnożyć całkowitą przewagę, gdy gracz gra zgodnie z zasadami?
    # Tak wygląda domyślna konfiguracja (oś x = sekundy, oś y = 1/1000 bloku): https://www.desmos.com/calculator/d4ufgxrxer
    setback-decay-multiplier: 0.999
    # Jak duże odchylenie od ruchu gracza powinno skutkować naruszeniem?
    # Mierzone w blokach od możliwego ruchu.
    # Uwzględniamy Optifine, przełączając tablice trygonometryczne, ale zmniejszenie tej wartości do 0.001 zmniejszy
    # liczbę fałszywych alarmów spowodowanych przez FastMath, jeśli ta kompensacja nie zadziała...
    threshold: 0.001
    # Jak duże naruszenie w jednym ticku spowoduje natychmiastowe cofnięcie gracza?
    # -1 aby wyłączyć
    immediate-setback-threshold: 0.1
    # Jak dużą całkowitą przewagę (we wszystkich tickach) trzeba osiągnąć, zanim zaczniemy cofać gracza?
    # -1 aby wyłączyć
    max-advantage: 1
    # Po 50 sekundach z domyślną konfiguracją, przewaga gracza spadnie z 4 bloków do 1 bloku.
    # Ma to na celu zapobieżenie gromadzeniu zbyt wielu naruszeń, których gracz nie mógłby później wyzerować.
    # Domyślny sufit przewagi (oś x = sekundy, oś y = 1/1000 bloku): https://www.desmos.com/calculator/4lovswdarj
    max-ceiling: 4
    # Próg poziomu naruszeń wymagany do cofnięcia.
    # 1 dla starego zachowania.
    setback-violation-threshold: 1
    # Max residual tolerance for firework look interpolation (blocks/tick)
    # Increase to 0.10 if getting false positives during fast turns with fireworks
    firework-residual-cap: 0.05

# Flying prediction - validates creative/ability flying speed
# This was previously disabled in CometAC, allowing unlimited fly speed
FlyingPrediction:
    # Enable flying movement prediction (validates fly speed)
    enabled: true
    # Extra tolerance for flying speed (blocks/tick)
    # Increase if getting false positives with modified clients (Lunar, etc.)
    # Default 0.05 covers float precision and minor client differences
    tolerance: 0.05

# Sprawdza, czy gracz wszedł w blok podczas ruchu.
Phase:
    setbackvl: 1 # Wchodzenie w bloki może umożliwiać wspinanie się po ścianach, dodatkowo ta kontrola jest względnie stabilna.
    decay: 0.005

AirLiquidPlace:
    cancelvl: 0

FabricatedPlace:
    cancelvl: 5

FarPlace:
    cancelvl: 5

PositionPlace:
    cancelvl: 5

RotationPlace:
    cancelvl: 5

# Oparta na predykcji kontrola NoSlow.
# Comet uwzględnia tutaj problematyczny kod sieciowy... trudno o fałszywe alarmy nawet przy spamowaniu prawym przyciskiem i przyciskiem offhand.
# Znacznie stabilniejsza niż w innych antycheatach, ale prosimy zgłaszać wszelkie fałszywe alarmy... Naprawiłem tu mnóstwo problemów z kodem sieciowym.
NoSlow:
    # Jakie odchylenie jest uznawane za "oszukiwanie"?
    # Domyślnie jest niższe niż w innych kontrolach.
    # Konsekwentnie wykrywa odchylenia o 0.03-0.2 przy włączonym NoSlow.
    threshold: 0.001
    # Szybkie cofnięcie przy pierwszym użyciu przedmiotu, aby usunąć przewagę dawaną przez NoSlow.
    setbackvl: 5
    # Spadek naruszeń, gdy gracz używa przedmiotu I jest przez niego spowalniany.
    decay: 0.05

Knockback:
    # O ile powinniśmy pomnożyć całkowitą przewagę, gdy gracz gra zgodnie z zasadami?
    setback-decay-multiplier: 0.999
    # Jak duże odchylenie od prędkości nadanej graczowi (velocity) powinno skutkować naruszeniem?
    # Mierzone w blokach od możliwej prędkości.
    threshold: 0.001
    # Jak duże naruszenie w jednym ticku spowoduje natychmiastowe cofnięcie gracza?
    # -1 aby wyłączyć
    immediate-setback-threshold: 0.1
    # Jak dużą całkowitą przewagę (we wszystkich tickach) trzeba osiągnąć, zanim zaczniemy cofać gracza?
    # -1 aby wyłączyć
    max-advantage: 1
    # Ma to na celu zapobieżenie gromadzeniu zbyt wielu naruszeń, których gracz nie mógłby później wyzerować.
    max-ceiling: 4

Explosion:
    threshold: 0.001
    setbackvl: 3

TimerA:
    setbackvl: 10
    # Liczba milisekund, które gracz może zgromadzić do późniejszego wykorzystania, gdy się opóźni.
    # Może potencjalnie umożliwić obejścia fast use/fast heal/fast bow z wersji 1.8, jeśli ustawione zbyt wysoko. 120 ms wydaje się dobrym kompromisem.
    drift: 120

# Ta kontrola ogranicza nadużywanie balansu z checku TimerA, zapobiegając zbytniemu opóźnieniu ruchu gracza względem czasu rzeczywistego.
TimerLimit:
    # Ping, przy którym kontrola zacznie ograniczać balans timera, aby zapobiec nadużyciom.
    # Może powodować pewne cofnięcia u uczciwych graczy, ale tylko jeśli mają ping powyżej tego progu.
    # -1 aby wyłączyć
    ping-abuse-limit-threshold: 1000

NegativeTimer:
    # Liczba milisekund straconych podczas ruchu, zanim zaczniemy wykrywać naruszenia.
    drift: 1200

# Ta sama metoda wykrywania co w TimerA, ale dla pojazdów.
VehicleTimer:
    # Celuje w timer 1.005
    setbackvl: 10

PacketOrderI:
    # Włącz, jeśli gracze są oznaczani za używanie modów do animacji z 1.7.
    exempt-placing-while-digging: false

Behavior:
    d:
        angle-threshold: 45.0
        players-only: true
        debug: false
    e:
        players-only: true
        debug: false
        buffer-threshold: 15

Trigger:
    a:
        # Attack interval spread analysis
        players-only: true
        debug: false
        sample-size: 10
        max-spread: 50

