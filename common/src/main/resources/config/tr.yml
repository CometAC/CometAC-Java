EntityPierce:
    # Enable detection of hitting through other entities
    enabled: true
    # Only check hits against players
    only-players: false
    # Setback VL for hitting through other entities
    setbackvl: 30

Hitboxes:
    extra-expansion: 0.01

Reach:
    # Hitbox'ları ne kadar genişletmeliyiz? 0.0005, 3.0005+ menzili tespit etmelidir
    #
    # 1.9-1.18.1 (1.18.2 değil) ile zorunlu olarak 0.03 genişletme vardır veya bazı istemci/sunucu kombinasyonları nedeniyle
    # protokol değişiklikleri ve sınırlamaları nedeniyle. Bu kontrol, 1.7/1.8 istemcilerle 1.8 sunucularda en güçlüdür.
    threshold: 0.0005
    # Eşik üzerine eklenen ekstra menzil mesafesi (bloklar).
    # Eşiğin aksine (hitbox'ı genişleten), bu yalnızca izin verilen menzil mesafesini genişletir,
    # Hitboxes ışın kesişim kontrolünü etkilemez.
    # Lag/interpolasyon nedeniyle Reach yanlış pozitifleri verir. 0.0 = varsayılan (katı).
    extra-expansion: 0.01
    # İmkansız olduğunu bildiğimiz vuruşları iptal etmeli miyiz?
    # Paket sırası sınırlamaları nedeniyle 3.00-3.03 arası vuruşlar gerçekleşebilir, ancak yine de işaretlenebilir
    block-impossible-hits: true
    # Sends an additional packet at the end of every tick to increase the likelihood of catching cheats.
    # Injects into server's connection list to send a final packet just before the server flushes.
    # Increases bandwidth usage for all players but does not decrease overall server performance.
    # Automatically disabled on 1.8 servers unless force-enable-post-packet is true.
    # Default: true (enabled on 1.9+ servers)
    enable-post-packet: true
    # Force enable post-packet even on 1.8 servers where it is auto-disabled.
    force-enable-post-packet: false

exploit:
    # Elytra ile sprint zıplarken yüksek hızlar kazanabilirsiniz, bu ayar false olarak ayarlandığında bu istismarı önler
    # Mojang, elytra'nın istemci tarafında başlamasını ve sunucu tarafında bitmesini sağlayarak netcode'u bozdu
    # Elytra'lar 0.99 yatay sürtünme alır, bu yüzden sürekli olarak 0.2 yatay hız eklemek çok yüksek hızlara yol açar
    allow-sprint-jumping-when-using-elytra: true
    # Bu seçenek, oyuncunun hayalet bloklar üzerindeki yerleşimini, gerçekleştiğinde oyuncuyu yeniden senkronize ederek hafifletir
    allow-building-on-ghostblocks: true
    # Bu ayar, yukarıdaki boolean ile etkilenen hayalet blokları kontrol etmek için mesafeyi tanımlar
    # Geçerli aralığı 2 ile 4 arasında sınırlıdır
    distance-to-check-if-ghostblocks: 2

# Netty'ye enjekte olan eklentileri giriş sırasında günlüklemeyi etkinleştirerek uyumluluk sorunlarını gider
debug-pipeline-on-join: false

# Enables all experimental checks
experimental-checks: false

# Enable specific experimental checks individually when experimental-checks is false.
# When experimental-checks is true, all experimental checks are enabled and this list is ignored.
enabled-experimental-checks:
#  - "AirStuck"
#  - "ElytraL"
#  - "ElytraM"
#  - "InventoryF"
#  - "InventoryG"

reset-item-usage-on-item-update: true
reset-item-usage-on-attack: true
reset-item-usage-on-slot-change: true
reset-item-usage-on-item-use: true

# Comet bazen timer gibi yasa dışı paketleri iptal eder; bir saniyede X paket iptal edildikten sonra, ne zaman
# oyuncuyu basitçe atmalıyız? Bu, bazı paket sınırlayıcılarının Comet tarafından iptal edilen paketleri saymaması gerektiğindendir.
packet-spam-threshold: 100
# Bir oyuncu packet-spam-threshold nedeniyle atıldığında stacktrace yazdırmak için bunu etkinleştirin
debug-packet-cancel: false

# Comet, uçma durumundan çıkmış bir oyuncunun X milisaniyeden fazla ping'e sahip olamayacağını uygulayabilir
# Bu, Comet'in şu anda uçan oyuncuları kontrol etmemesindendir
# Devre dışı bırakmak için -1 yazın
max-ping-out-of-flying: 1000

# Bir havai fişek ivmesi oyuncudan çıkarıldığında maksimum ping.
# Bu, yüksek gecikmeli oyuncuların bir havai fişek ivmesini elytra ile sonsuza kadar kullanmalarını engeller.
max-ping-firework-boost: 1000

# Şema işaretçileri — yalnızca ne yaptığınızı biliyorsanız değiştirin.
#   config-flavor:  V2 = Comet 2.x derlemesi, V3 = Comet 3.x. Eklenti, flavor'ı
#                   kendi derlemesiyle uyuşmayan bir config'i yüklemeyi
#                   reddeder; V3 config'i V2 jar ile açılırsa, yanlış
#                   anahtarlara sessizce karışmak yerine hemen başarısız olur.
#   config-version: her geriye dönük uyumsuz biçim değişikliğinde artırılır.
#                   Eski config'ler bir sonraki başlatmada, pakete dahil
#                   updater tarafından otomatik taşınır.
# LuckPerms kurulu olsun ya da olmasın, bir oyuncu katıldığında ve Comet yeniden
# yüklendiğinde Comet önbellekteki izinleri her zaman yeniler.
# LuckPerms olay hook'ları normal kurulumlarda önbellekteki Comet izinlerini de
# anında yeniler.
# Bu periyodik yedek yalnızca bu olayların kapsamadığı çevrim içi izin
# değişiklikleri için gereklidir; örneğin signalContextUpdate çağırmayan özel bir
# LuckPerms context'i, Fabric context boşlukları veya LuckPerms dışında izinleri
# canlı olarak değiştiren bir izin sağlayıcısı.
# Yoklamayı devre dışı bırakmak için -1 kullanın. Her X tick'te yenilemek için pozitif bir değer kullanın.
update-permission-ticks: -1

config-flavor: V2
config-version: 11
