EntityPierce:
    # Enable detection of hitting through other entities
    enabled: true
    # Only check hits against players
    only-players: false
    # Setback VL for hitting through other entities
    setbackvl: 30

Hitboxes:
    # Extra hitbox expansion (blocks) applied on top of Reach's expansion
    # when checking if a ray intersects the entity hitbox.
    # Increase this if Hitboxes false-flags on your server due to interpolation desync.
    # 0.0 = strict (original Comet behavior), 0.1 = lenient, 0.2+ = very lenient
    extra-expansion: 0.01

Reach:
    # How much should we expand hitboxes by? 0.0005 should detect 3.0005+ reach
    #
    # There is 0.03 forced expansion with 1.9-1.18.1 (not 1.18.2), or some client/server combinations due to
    # protocol changes and limitations. This check is most powerful with 1.7/1.8 clients on 1.8 servers.
    threshold: 0.0005
    # Extra reach distance (blocks) added on top of threshold.
    # Unlike threshold (which expands the hitbox), this extends the allowed reach distance only,
    # without affecting the Hitboxes ray intersection check.
    # Increase if Reach false-flags due to lag/interpolation. 0.0 = default (strict).
    extra-expansion: 0.01
    # Should we cancel hits that we know are impossible?
    # 3.00-3.03 hits may go through but still be flagged, due to packet order limitations
    block-impossible-hits: true
    # Sends an additional packet at the end of every tick to increase the likelihood of catching cheats.
    # Injects into server's connection list to send a final packet just before the server flushes.
    # Increases bandwidth usage for all players but does not decrease overall server performance.
    # Automatically disabled on 1.8 servers unless force-enable-post-packet is true.
    # Default: true (enabled on 1.9+ servers)
    enable-post-packet: true
    # Force enable post-packet even on 1.8 servers where it is auto-disabled.
    force-enable-post-packet: false

exploit:
    # You can gain high speeds when sprint jumping with an elytra, this prevents the exploit when set to false
    # Mojang screwed up netcode by making elytra start client sided and elytra end server sided
    # Elytras take 0.99 horizontal friction, so constantly adding 0.2 horizontal speeds results in very high speeds.
    allow-sprint-jumping-when-using-elytra: true
    # This option mitigates the player's placement on ghostblocks by resynchronizing the player when it happens
    allow-building-on-ghostblocks: true
    # This setting, influenced by the boolean above defines the distance to check for ghost blocks
    # Its valid range is limited from 2 to 4
    distance-to-check-if-ghostblocks: 2

# Enable logging plugins who have injected into netty on join to debug compatibility issues
debug-pipeline-on-join: false

# Enables all experimental checks
experimental-checks: false

# Enable specific experimental checks individually when experimental-checks is false.
# When experimental-checks is true, all experimental checks are enabled and this list is ignored.
enabled-experimental-checks:
#  - "AirStuck"
#  - "ElytraL"
#  - "ElytraM"
#  - "InventoryF"
#  - "InventoryG"

reset-item-usage-on-item-update: true
reset-item-usage-on-attack: true
reset-item-usage-on-slot-change: true
reset-item-usage-on-item-use: true

# Comet sometimes cancels illegal packets such as with timer, after X packets in a second cancelled, when should
# we simply kick the player? This is required as some packet limiters don't count packets cancelled by comet.
packet-spam-threshold: 100
# Enable this to print a stacktrace when a player is kicked due to packet-spam-threshold
debug-packet-cancel: false

# Comet is able to enforce that a player set out of flying state cannot have more than X milliseconds of ping
# This is due to Comet not currently checking flying players
# To disable, use -1
max-ping-out-of-flying: 1000

# Maximum ping when a firework boost is removed from the player.
# This prevents high latency players from being able to use 1 firework boost with an elytra forever.
max-ping-firework-boost: 1000

# Comet always refreshes cached permissions when a player joins and when Comet reloads,
# whether or not LuckPerms is installed.
# LuckPerms event hooks also refresh cached Comet permissions immediately in normal setups.
# This periodic fallback is only needed for online permission changes not covered by
# those events, such as a custom LuckPerms context that does not call signalContextUpdate,
# Fabric context gaps, or a non-LuckPerms permission provider that changes live.
# Set to -1 to disable polling. Set to a positive value to refresh every X ticks.
update-permission-ticks: -1

# Schema markers — touch only if you know what you're doing.
#   config-flavor:  V2 = Comet 2.x build, V3 = Comet 3.x. The plugin refuses
#                   to load a config whose flavor doesn't match its own
#                   build, so a V3 config opened by a V2 jar fails fast
#                   instead of silently flat-merging into the wrong keys.
#   config-version: bumped on every breaking shape change. Old configs
#                   auto-migrate up via the bundled updater on next start.
config-flavor: V2
config-version: 11
