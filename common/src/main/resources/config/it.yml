EntityPierce:
    # Enable detection of hitting through other entities
    enabled: true
    # Only check hits against players
    only-players: false
    # Setback VL for hitting through other entities
    setbackvl: 30

Hitboxes:
    extra-expansion: 0.01

Reach:
    # Limite per rilevare un attacco oltre la distanza massima
    threshold: 0.0005
    # Distanza di portata extra (blocchi) aggiunta in cima alla soglia.
    # A differenza della soglia (che espande l'hitbox), questo estende solo la distanza di portata consentita,
    # senza influenzare il controllo dell'intersezione dei raggi delle hitbox.
    # Aumenta se Reach genera falsi positivi a causa di lag/interpolazione. 0.0 = predefinito (rigoroso).
    extra-expansion: 0.01
    # Annulla gli attacchi impossibili
    block-impossible-hits: true
    # Sends an additional packet at the end of every tick to increase the likelihood of catching cheats.
    # Injects into server's connection list to send a final packet just before the server flushes.
    # Increases bandwidth usage for all players but does not decrease overall server performance.
    # Automatically disabled on 1.8 servers unless force-enable-post-packet is true.
    # Default: true (enabled on 1.9+ servers)
    enable-post-packet: true
    # Force enable post-packet even on 1.8 servers where it is auto-disabled.
    force-enable-post-packet: false

exploit:
    # Abilita il salto in sprint con l'elytra
    allow-sprint-jumping-when-using-elytra: true
    # Abilita la costruzione su ghost blocks
    allow-building-on-ghostblocks: true
    # Distanza per controllare i ghost blocks
    distance-to-check-if-ghostblocks: 2

# Enable logging plugins who have injected into netty on join to debug compatibility issues
debug-pipeline-on-join: false

# Enables all experimental checks
experimental-checks: false

# Enable specific experimental checks individually when experimental-checks is false.
# When experimental-checks is true, all experimental checks are enabled and this list is ignored.
enabled-experimental-checks:
#  - "AirStuck"
#  - "ElytraL"
#  - "ElytraM"
#  - "InventoryF"
#  - "InventoryG"

reset-item-usage-on-item-update: true
reset-item-usage-on-attack: true
reset-item-usage-on-slot-change: true
reset-item-usage-on-item-use: true

# Comet sometimes cancels illegal packets such as with timer, after X packets in a second cancelled, when should
# we simply kick the player? This is required as some packet limiters don't count packets cancelled by comet.
packet-spam-threshold: 100
# Abilita questa opzione per stampare uno stacktrace quando un giocatore viene espulso a causa del packet-spam-threshold
debug-packet-cancel: false

# Comet può imporre che un giocatore uscito dallo stato di volo non abbia più di X ms di ping
# Questo perché Comet al momento non controlla i giocatori in volo
# Per disattivare, usa -1
max-ping-out-of-flying: 1000

# Ping massimo quando il boost del fuoco d’artificio viene rimosso dal giocatore.
# Impedisce ai giocatori con alta latenza di usare all’infinito un solo boost con fuochi d’artificio ed elytra.
max-ping-firework-boost: 1000

# Marcatori di schema — toccare solo se si sa cosa si sta facendo.
#   config-flavor:  V2 = build di Comet 2.x, V3 = Comet 3.x. Il plugin si rifiuta
#                   di caricare una config il cui flavor non corrisponde al
#                   proprio build; una config V3 aperta da un jar V2 fallisce
#                   subito invece di fondere silenziosamente nelle chiavi
#                   sbagliate.
#   config-version: incrementata a ogni modifica di forma incompatibile. Le
#                   vecchie config vengono migrate automaticamente
#                   dall'updater integrato al prossimo avvio.
# Comet aggiorna sempre i permessi memorizzati nella cache quando un giocatore entra
# e quando Comet viene ricaricato, indipendentemente dal fatto che LuckPerms sia installato.
# Gli hook degli eventi di LuckPerms aggiornano immediatamente anche i permessi
# di Comet in cache nelle configurazioni normali.
# Questo fallback periodico serve solo per modifiche ai permessi online non coperte
# da quegli eventi, ad esempio un contesto LuckPerms personalizzato che non chiama
# signalContextUpdate, lacune nei contesti Fabric o un provider di permessi diverso
# da LuckPerms che modifica i permessi in tempo reale.
# Imposta -1 per disattivare il polling. Imposta un valore positivo per aggiornare ogni X tick.
update-permission-ticks: -1

config-flavor: V2
config-version: 11
