EntityPierce:
    # Enable detection of hitting through other entities
    enabled: true
    # Only check hits against players
    only-players: false
    # Setback VL for hitting through other entities
    setbackvl: 30

Hitboxes:
    extra-expansion: 0.01

Reach:
    # ヒットボックスをどれだけ拡大するかを設定します。0.0005に設定することで3.0005以上のリーチを検出できます
    #
    # プロトコルの変更や制限により、1.9〜1.18.1（1.18.2を除く）や
    # 一部のクライアント/サーバーの組み合わせでは、強制的に0.03の拡大が適用される場合があります。
    # このチェックは1.7/1.8クライアントが1.8サーバーに接続した際に最も効果的です。
    threshold: 0.0005
    # しきい値の上に追加される追加のリーチ距離（ブロック）。
    # しきい値（ヒットボックスを拡張する）とは異なり、これは許可されたリーチ距離のみを拡張し、
    # ヒットボックスのレイ交差点チェックには影響しません。
    # ラグ/補間によるリーチの誤検知が発生する場合は増加してください。 0.0 = デフォルト（厳密）。
    extra-expansion: 0.01
    # 不可能なヒット（距離的に届かない攻撃）をキャンセルするか
    # 3.00〜3.03のリーチによるヒットが通る場合がありますが、パケット順序の制限によりフラグが立つこともあります
    block-impossible-hits: true
    # Sends an additional packet at the end of every tick to increase the likelihood of catching cheats.
    # Injects into server's connection list to send a final packet just before the server flushes.
    # Increases bandwidth usage for all players but does not decrease overall server performance.
    # Automatically disabled on 1.8 servers unless force-enable-post-packet is true.
    # Default: true (enabled on 1.9+ servers)
    enable-post-packet: true
    # Force enable post-packet even on 1.8 servers where it is auto-disabled.
    force-enable-post-packet: false

exploit:
    # エリトラでダッシュジャンプを行うと非常に高い速度を得られるエクスプロイト（意図しない挙動）があります。
    # この設定をfalseにすると、そのエクスプロイトを防ぎます
    # Mojangのネットコードにより、エリトラの動作は開始がクライアント側、終了がサーバー側で処理されるためにズレが生じています。
    # エリトラは水平摩擦0.99を持ち、水平速度0.2が常に追加されると非常に高速度になります。
    allow-sprint-jumping-when-using-elytra: true

    # このオプションは、ゴーストブロックが発生したときにプレイヤーを再同期させることで、
    # ゴーストブロックへのブロック設置をできるだけ制限します
    allow-building-on-ghostblocks: true

    # 上記の設定に基づき、ゴーストブロックのチェック距離を定義します
    # 設定可能な範囲は2から4です
    distance-to-check-if-ghostblocks: 2

# Nettyに参加時にプラグインが注入された場合の互換性問題をデバッグするためにログを有効にします
debug-pipeline-on-join: false

# Enables all experimental checks
experimental-checks: false

# Enable specific experimental checks individually when experimental-checks is false.
# When experimental-checks is true, all experimental checks are enabled and this list is ignored.
enabled-experimental-checks:
#  - "AirStuck"
#  - "ElytraL"
#  - "ElytraM"
#  - "InventoryF"
#  - "InventoryG"

reset-item-usage-on-item-update: true
reset-item-usage-on-attack: true
reset-item-usage-on-slot-change: true
reset-item-usage-on-item-use: true

# Cometは "Timer" のような違反パケットをキャンセルすることがありますが、1秒間にキャンセルされたパケット数がXを超えた場合、
# プレイヤーを強制的にキックしますか？これは、いくつかのパケットリミッターがCometによってキャンセルされたパケットをカウントしないためです。
packet-spam-threshold: 100
# packet-spam-threshold によりプレイヤーがキックされたときにスタックトレースを出力する場合は有効にする
debug-packet-cancel: false

# Cometは、飛行状態を解除されたプレイヤーがXミリ秒以上のPingを持つことを許可しません
# これは、現在Cometが飛行中のプレイヤーをチェックしていないためです
# 無効にするには、-1を設定してください
max-ping-out-of-flying: 1000

# プレイヤーから、ロケット花火による加速効果を削除する際の最大ピン値
# これにより、レイテンシの高いプレイヤーが1つのロケット花火による加速でエリトラを永久に使用するのを防ぎます。
max-ping-firework-boost: 1000

# スキーマ用マーカー — 内容を理解した上でのみ変更してください。
#   config-flavor:  V2 = Comet 2.x ビルド、V3 = Comet 3.x。プラグインは自身の
#                   ビルドと flavor が一致しない設定の読み込みを拒否します。
#                   V3 用設定を V2 jar で開いた場合は、誤ったキーへ静かに
#                   マージされず、即座に失敗します。
#   config-version: 互換性のない形式変更があるたびに増加します。古い設定は
#                   次回起動時、同梱の updater が自動で移行します。
# LuckPerms がインストールされているかどうかに関係なく、プレイヤー参加時と
# Comet のリロード時には、Comet は常にキャッシュ済み権限を更新します。
# 通常の構成では、LuckPerms のイベントフックもキャッシュ済みの Comet 権限を
# 即座に更新します。
# この定期的なフォールバックは、それらのイベントで扱われないオンライン中の
# 権限変更にのみ必要です。例: signalContextUpdate を呼ばないカスタム LuckPerms
# コンテキスト、Fabric のコンテキストの不足、または LuckPerms 以外の権限
# プロバイダーが実行中に権限を変更する場合。
# ポーリングを無効化するには -1 にします。正の値にすると X tick ごとに更新します。
update-permission-ticks: -1

config-flavor: V2
config-version: 11
